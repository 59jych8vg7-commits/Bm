<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bridesmaid Proposal 💛</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#fbf7f2;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

.card{
  background:#fff;
  width:90%;
  max-width:420px;
  padding:35px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  position:relative;
}

h1{
  margin-top:0;
  color:#8b6b2d;
}

p{
  color:#555;
  line-height:1.6;
}

.buttons{
  margin-top:25px;
  height:140px;
  position:relative;
}

button{
  border:none;
  padding:14px 26px;
  font-size:16px;
  border-radius:12px;
  cursor:pointer;
  position:absolute;
  transition:0.2s ease;
}

#yes{
  background:#c8a84d;
  color:white;
  left:20%;
  top:20px;
}

#no{
  background:#e9e9e9;
  left:55%;
  top:20px;
}

#msg{
  margin-top:20px;
  font-weight:600;
  color:#8b6b2d;
}

.music-note{
  font-size:12px;
  color:#999;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- 🎵 Nigerian party vibe audio -->
<audio id="music" loop crossorigin="anonymous">
  <!-- Multiple sources for better compatibility -->
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div class="card">
  <h1>Official Business 💛</h1>

  <p>
    Since we already did the "I do," it's time for Part 2—the Nigerian edition. 🇳🇬
  </p>

  <p><strong>Will you be my bridesmaid?</strong></p>

  <div class="buttons">
    <button id="yes">YES 🤍</button>
    <button id="no">NO</button>
  </div>

  <div id="msg"></div>

  <div class="music-note">
    (turn volume up 🎶)
  </div>
</div>

<script>

const music = document.getElementById("music");

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const msg = document.getElementById("msg");

let count = 0;

// 🎵 Start music after first interaction (browser requirement)
function startMusic(){
  music.volume = 0.5;
  
  const playPromise = music.play();
  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        console.log("Music playing!");
      })
      .catch((error) => {
        console.log("Music autoplay prevented:", error);
        msg.innerText = "Click to play music 🎶";
      });
  }
  
  document.removeEventListener("click", startMusic);
}
document.addEventListener("click", startMusic);

// YES action
yesBtn.addEventListener("click", () => {
  music.volume = 0.8;

  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial;text-align:center;padding:20px;background:#fbf7f2;">
      <div>
        <h1>YAY!! 🥹💛</h1>
        <p>Bridal party officially secured.</p>
        <p>Let the owambe planning begin 🇳🇬✨</p>
      </div>
    </div>
  `;
});

// NO runaway logic
noBtn.addEventListener("mouseenter", moveButton);

function moveButton(){
  const card = document.querySelector(".card");

  const maxX = card.clientWidth - noBtn.offsetWidth - 20;
  const maxY = 100;

  const randomX = Math.floor(Math.random() * maxX);
  const randomY = Math.floor(Math.random() * maxY) + 90;

  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
}

// click fallback jokes
noBtn.addEventListener("click", () => {
  count++;

  if(count === 1){
    noBtn.innerText = "Nice try 😂";
    msg.innerText = "Music says otherwise 🎶";
  }
  else if(count === 2){
    noBtn.innerText = "Wrong button 🤨";
    yesBtn.style.transform = "scale(1.2)";
  }
  else{
    noBtn.style.display = "none";
    msg.innerText = "Only one correct answer 😌";
    yesBtn.style.transform = "scale(1.4)";
  }
});

</script>

</body>
</html>
