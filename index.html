<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#fbf7f2;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

.card{
  background:#fff;
  width:90%;
  max-width:420px;
  padding:35px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  position:relative;
}

h1{
  margin-top:0;
  color:#8b6b2d;
}

p{
  color:#555;
  line-height:1.6;
}

.buttons{
  margin-top:25px;
  height:100px;
  position:relative;
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:14px 26px;
  font-size:16px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s ease;
  background:#c8a84d;
  color:white;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(200,168,77,0.3);
}

#msg{
  margin-top:20px;
  font-weight:600;
  color:#8b6b2d;
}

.music-note{
  font-size:12px;
  color:#999;
  margin-top:10px;
}

.disclaimer{
  font-size:11px;
  color:#aaa;
  margin-top:25px;
  padding-top:15px;
  border-top:1px solid #f0f0f0;
}

.song-credit{
  font-size:10px;
  color:#bbb;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- 🎵 Intentions by FAVE -->
<audio id="music" loop crossorigin="anonymous">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div class="card">
  <h1>Official Business 💛</h1>

  <p>
    Since we already did the "I do," it's time for Part 2—the Nigerian edition. 🇳🇬
  </p>

  <p><strong>Will you be my bridesmaid?</strong></p>

  <div class="buttons">
    <button id="yes1">YES 🤍</button>
    <button id="yes2">YES 💛</button>
  </div>

  <div id="msg"></div>

  <div class="music-note">
    (turn volume up 🎶)
  </div>

  <div class="song-credit">
    🎵 Intentions - FAVE
  </div>

  <div class="disclaimer">
    ⚠️ Due to technical issues, "NO" is not an option
  </div>
</div>

<script>

const music = document.getElementById("music");

const yes1Btn = document.getElementById("yes1");
const yes2Btn = document.getElementById("yes2");
const msg = document.getElementById("msg");

// 🎵 Start music after first interaction (browser requirement)
function startMusic(){
  music.volume = 0.5;
  
  const playPromise = music.play();
  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        console.log("Music playing!");
      })
      .catch((error) => {
        console.log("Music autoplay prevented:", error);
        msg.innerText = "Click to play music 🎶";
      });
  }
  
  document.removeEventListener("click", startMusic);
}
document.addEventListener("click", startMusic);

// YES action for both buttons
function handleYes(){
  music.volume = 0.8;

  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial;text-align:center;padding:20px;background:#fbf7f2;">
      <div>
        <h1>YAY!! 🥹💛</h1>
        <p>Bridal party officially secured.</p>
        <p>Let the owambe planning begin 🇳🇬✨</p>
      </div>
    </div>
  `;
}

yes1Btn.addEventListener("click", handleYes);
yes2Btn.addEventListener("click", handleYes);

</script>

</body>
</html>
